
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="190" viewBox="0 0 1000 190" role="img" aria-label="Full Stack Java Journey platformer animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#061A35"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00AEEF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#003893" stop-opacity="0.15"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="190" rx="24" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">
    Level 1: Full Stack Java Journey
  </text>

  <text x="50" y="78" fill="#A9CFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">
    Java • Spring Boot • React • Angular • APIs REST • Database
  </text>

  <!-- Stars -->
  <g filter="url(#glow)">
    <polygon points="860,35 866,50 882,50 869,59 874,75 860,65 846,75 851,59 838,50 854,50" fill="#F7D116">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 860 56;360 860 56" dur="7s" repeatCount="indefinite"/>
    </polygon>

    <polygon points="925,58 930,71 944,71 933,79 937,93 925,85 913,93 917,79 906,71 920,71" fill="#F7D116" opacity="0.8">
      <animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Floating blocks -->
  <g filter="url(#softShadow)">
    <rect x="690" y="82" width="42" height="42" rx="7" fill="#F7D116" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <text x="705" y="111" fill="#061A35" font-family="Arial" font-size="24" font-weight="900">?</text>

    <rect x="742" y="82" width="42" height="42" rx="7" fill="#CF2027" stroke="#FFFFFF" stroke-opacity="0.25"/>
    <rect x="794" y="82" width="42" height="42" rx="7" fill="#003893" stroke="#FFFFFF" stroke-opacity="0.25"/>
  </g>

  <!-- Coin -->
  <g filter="url(#glow)">
    <circle cx="620" cy="104" r="14" fill="#F7D116">
      <animate attributeName="cy" values="104;82;104" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.65;1;0.65" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="616" y="92" width="8" height="24" rx="4" fill="#FFFFFF" opacity="0.45">
      <animate attributeName="height" values="24;6;24" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="92;101;92" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ground -->
  <rect x="0" y="138" width="1000" height="8" fill="#00AEEF" opacity="0.25"/>
  <rect x="0" y="146" width="1000" height="44" fill="#020617" opacity="0.78"/>
  <path d="M0 138 C120 120, 240 153, 360 138 C480 123, 600 153, 720 138 C840 122, 930 148, 1000 135 L1000 190 L0 190 Z" fill="url(#floor)">
    <animateTransform attributeName="transform" type="translate" values="-12 0;12 0;-12 0" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Original platform hero, not official Mario -->
  <g filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="70 0; 360 0; 620 0; 70 0"
        dur="8s" repeatCount="indefinite"/>

      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; 0 -18; 0 0"
        dur="0.9s" repeatCount="indefinite"/>

      <!-- Legs -->
      <rect x="7" y="126" width="9" height="21" rx="4" fill="#FFFFFF"/>
      <rect x="25" y="126" width="9" height="21" rx="4" fill="#FFFFFF"/>

      <!-- Shoes -->
      <rect x="2" y="144" width="16" height="6" rx="3" fill="#00AEEF"/>
      <rect x="22" y="144" width="16" height="6" rx="3" fill="#00AEEF"/>

      <!-- Body -->
      <rect x="2" y="94" width="38" height="36" rx="9" fill="#00AEEF"/>
      <rect x="9" y="100" width="24" height="26" rx="6" fill="#003893" opacity="0.55"/>

      <!-- Head -->
      <circle cx="21" cy="78" r="17" fill="#FFD7A1"/>

      <!-- Generic cap -->
      <path d="M4 75 C8 57, 33 57, 38 75 Z" fill="#CF2027"/>
      <rect x="28" y="71" width="22" height="6" rx="3" fill="#CF2027"/>

      <!-- Face -->
      <circle cx="15" cy="79" r="2" fill="#061A35"/>
      <circle cx="26" cy="79" r="2" fill="#061A35"/>
      <path d="M16 87 C20 90, 24 90, 28 87" fill="none" stroke="#061A35" stroke-width="2" stroke-linecap="round"/>

      <!-- Arms -->
      <rect x="-8" y="99" width="11" height="24" rx="6" fill="#FFD7A1"/>
      <rect x="39" y="99" width="11" height="24" rx="6" fill="#FFD7A1"/>

      <!-- Code badge -->
      <rect x="9" y="106" width="24" height="13" rx="4" fill="#020617" opacity="0.8"/>
      <text x="21" y="116" text-anchor="middle" fill="#F7D116" font-family="Arial" font-size="9" font-weight="800">JS</text>
    </g>
  </g>

  <!-- Small tech pickups -->
  <g filter="url(#glow)">
    <rect x="430" y="114" width="36" height="24" rx="6" fill="#6DB33F">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="448" y="131" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="10" font-weight="800">API</text>

    <rect x="500" y="114" width="42" height="24" rx="6" fill="#003893">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <text x="521" y="131" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="10" font-weight="800">SQL</text>
  </g>

  <!-- Particles -->
  <g fill="#00AEEF">
    <circle cx="180" cy="118" r="3">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="108" r="2.5">
      <animate attributeName="opacity" values="1;0;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="122" r="2.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
